project_name: "i-jepa-imagenet"
run_name: "i-jepa-imagenet-vit-b-01"

# --- Data / patch geometry ---
in_channels: 3
image_size: 256
patch_size: 16
shuffle_buffer: 10000  # Uses IterableDataset so we need to shuffle the stream of data. This is the size of the buffer used for shuffling.

# --- Masking ---
num_target_blocks: 4
mask_seed: 0

# --- Encoder (ViT-Base) ---
encoder_d_model: 768
encoder_d_ff: 3072
encoder_num_heads: 12
encoder_num_layers: 12
encoder_dropout: 0.0

# --- Predictor (narrower and shallower than the encoder) ---
predictor_d_model: 384
predictor_d_ff: 1536
predictor_num_heads: 12
predictor_num_layers: 6
predictor_dropout: 0.0

# --- Optimization ---
batch_size: 64
gradient_accumulation_steps: 2
learning_rate: 1.0e-3
weight_decay: 0.05
warmup_steps: 50000
max_steps: 1000000        # ~1.28M/128 = 10k steps per epoch, roughly 100 epochs

# --- EMA target encoder momentum, cosine-ramped from start to end ---
ema_start: 0.996
ema_end: 1.0

# --- Logging / IO ---
log_every: 10000
save_every: 50000

wandb_dir: "logs"
checkpoint_dir: "artifacts/checkpoints/ijepa-imagenet"

# --- Checkpoint loading ---
from_checkpoint: null   # path to resume/warm-start from; null = train from scratch
is_resume: false        # if true, also restore optimizer, step, and mask RNG

num_workers: 8
drop_last: true
no_epochs: false        # on stream exhaustion, restart the stream and keep going

# --- Data source ---
# false (default): read the locally cached parquet (run scripts/imagenet_download.py --cache first to use).
# true: stream from HuggingFace; no download, but caps num_workers at 5 and needs the network every step.
use_streaming: false
